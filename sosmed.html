<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SUNTIK SOSMED | DENZ STORE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
overflow-x:hidden;
background:
linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:#fff;
position:relative;
}

/* background glow */
body::before,
body::after{
content:"";
position:fixed;
width:300px;
height:300px;
border-radius:50%;
filter:blur(90px);
opacity:.45;
z-index:-1;
}

body::before{
top:-80px;
left:-70px;
background:#ff00c8;
}

body::after{
right:-80px;
bottom:-80px;
background:#00e5ff;
}

/* header */
.header{
text-align:center;
padding:32px 18px 18px;
}

.badge{
display:inline-block;
padding:8px 16px;
border-radius:999px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.14);
font-size:12px;
font-weight:700;
margin-bottom:14px;
backdrop-filter:blur(12px);
}

.header h1{
font-size:34px;
font-weight:900;
letter-spacing:1px;
margin-bottom:8px;
background:linear-gradient(90deg,#ff00c8,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
font-size:14px;
color:#d5d9ff;
max-width:320px;
margin:auto;
line-height:1.5;
}

/* wrap */
.wrap{
max-width:430px;
margin:auto;
padding:16px;
}

.card{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border-radius:26px;
padding:18px;
box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.label{
font-size:13px;
font-weight:700;
margin:10px 0 8px;
color:#eaf0ff;
}

select,input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.08);
color:#fff;
font-size:14px;
border:1px solid rgba(255,255,255,.1);
}

option{
color:#111;
}

#priceBox{
margin-top:14px;
padding:14px;
border-radius:18px;
text-align:center;
font-size:16px;
font-weight:900;
background:linear-gradient(90deg,#ff00c8,#00e5ff);
color:#fff;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.btn{
margin-top:16px;
width:100%;
padding:15px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:900;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#ff00c8,#00e5ff);
box-shadow:0 15px 28px rgba(0,0,0,.35);
}

.note{
font-size:12px;
color:#dce3ff;
text-align:center;
margin-top:14px;
line-height:1.5;
}

.back{
max-width:430px;
margin:8px auto 32px;
padding:0 16px;
}

.back a{
display:block;
text-align:center;
padding:14px;
text-decoration:none;
font-weight:800;
color:#fff;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;
backdrop-filter:blur(14px);
}

audio{
display:none;
}
</style>
</head>

<body>

<audio id="bgm" autoplay loop>
<source src="lagu.mp3">
</audio>

<div class="header">
<div class="badge">FAST BOOST SYSTEM</div>
<h1>SUNTIK SOSMED</h1>
<p>Followers, likes, views dan lainnya dengan sistem order otomatis.</p>
</div>

<div class="wrap">
<div class="card">

<div class="label">Platform</div>
<select id="platform">
<option>Instagram</option>
<option>TikTok</option>
<option>Facebook</option>
<option>Telegram</option>
<option>WhatsApp Channel</option>
</select>

<div class="label">Kategori</div>
<select id="kategori" onchange="updateJumlah();updatePrice();">
<option>Followers</option>
<option>Likes</option>
<option>Views</option>
<option>Members</option>
<option>Pengikut Saluran</option>
</select>

<div class="label">Jumlah</div>
<select id="jumlah" onchange="updatePrice()"></select>

<div class="label">Link Akun / Postingan</div>
<input type="text" id="link" placeholder="Masukkan link di sini">

<div id="priceBox">Harga: Rp5.000</div>

<button class="btn" onclick="orderWA()">PESAN SEKARANG</button>

<div class="note">
Harga likes/views lebih murah. Pastikan link benar.
</div>

</div>
</div>

<div class="back">
<a href="index.html">⬅ KEMBALI</a>
</div>

<script>
function updateJumlah(){
let kategori=document.getElementById("kategori").value;
let jumlah=document.getElementById("jumlah");
jumlah.innerHTML="";

let max = 5000;
let step = 25;

for(let i=25;i<=max;i+=step){
let op=document.createElement("option");
op.value=i;
op.text=i;
jumlah.appendChild(op);
}
}

function updatePrice(){
let kategori=document.getElementById("kategori").value;
let jumlah=parseInt(document.getElementById("jumlah").value);

let harga=5000;

/* likes/views murah */
if(kategori=="Likes" || kategori=="Views"){
harga=Math.ceil(jumlah/1000)*1000;
if(jumlah>=5000) harga=5000;
}

/* followers/member lebih mahal */
else{
harga=Math.ceil(jumlah/100)*2000;
}

document.getElementById("priceBox").innerHTML=
"Harga: Rp"+harga.toLocaleString("id-ID");
}

function orderWA(){
let platform=document.getElementById("platform").value;
let kategori=document.getElementById("kategori").value;
let jumlah=document.getElementById("jumlah").value;
let link=document.getElementById("link").value;
let harga=document.getElementById("priceBox").innerText;

if(link.trim()==""){
alert("Masukkan link dulu.");
return;
}

let msg=
`Halo bang saya mau order suntik sosmed:%0A%0A`+
`Platform: ${platform}%0A`+
`Kategori: ${kategori}%0A`+
`Jumlah: ${jumlah}%0A`+
`${harga}%0A`+
`Link: ${link}`;

window.location.href=
`https://wa.me/6285798898725?text=${msg}`;
}

document.body.addEventListener("click",()=>{
document.getElementById("bgm").play();
},{once:true});

updateJumlah();
updatePrice();
</script>

</body>
</html>
