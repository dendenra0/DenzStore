<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PANEL HOSTING | SERVER BLUE ELITE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
overflow-x:hidden;
background:
radial-gradient(circle at top left,#00d9ff33,transparent 25%),
radial-gradient(circle at bottom right,#4d7cff33,transparent 30%),
linear-gradient(135deg,#030814,#07111f,#0c1830,#13254a);
color:#fff;
position:relative;
}

/* grid bg */
body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
background-size:28px 28px;
z-index:-1;
opacity:.45;
}

/* header */
.header{
text-align:center;
padding:34px 18px 18px;
}

.badge{
display:inline-block;
padding:9px 18px;
border-radius:999px;
background:rgba(0,217,255,.08);
border:1px solid rgba(0,217,255,.28);
backdrop-filter:blur(14px);
font-size:12px;
font-weight:900;
letter-spacing:1px;
color:#9fefff;
margin-bottom:14px;
box-shadow:0 0 20px rgba(0,217,255,.15);
}

.header h1{
font-size:35px;
font-weight:900;
margin-bottom:8px;
background:linear-gradient(90deg,#ffffff,#86f7ff,#4d7cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 18px rgba(0,217,255,.12);
}

.header p{
font-size:14px;
color:#cbeaff;
}

/* wrap */
.wrap{
max-width:430px;
margin:auto;
padding:16px;
}

/* card */
.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border-radius:28px;
padding:18px;
box-shadow:
0 25px 45px rgba(0,0,0,.35),
0 0 28px rgba(0,217,255,.08);
}

/* labels */
.label{
font-size:13px;
font-weight:800;
margin:12px 0 8px;
color:#dff7ff;
}

/* inputs */
select,input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.06);
color:#fff;
font-size:14px;
border:1px solid rgba(255,255,255,.12);
box-shadow:inset 0 0 12px rgba(255,255,255,.02);
}

option{
color:#111;
}

/* price */
#priceBox{
margin-top:16px;
padding:15px;
border-radius:20px;
text-align:center;
font-size:17px;
font-weight:900;
background:linear-gradient(90deg,#00d9ff,#4d7cff);
color:#fff;
box-shadow:
0 15px 28px rgba(0,217,255,.18),
0 0 22px rgba(77,124,255,.15);
}

/* main button */
.btn{
margin-top:16px;
width:100%;
padding:16px;
border:none;
border-radius:20px;
font-size:15px;
font-weight:900;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#00d9ff,#4d7cff,#6fa9ff);
background-size:200% 200%;
animation:flow 3s linear infinite;
box-shadow:
0 18px 30px rgba(0,217,255,.20),
0 0 24px rgba(77,124,255,.15);
transition:.2s;
}

.btn:active{
transform:scale(.98);
}

@keyframes flow{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* note */
.note{
font-size:12px;
color:#d4efff;
text-align:center;
margin-top:14px;
line-height:1.5;
}

/* back button */
.back{
max-width:430px;
margin:10px auto 32px;
padding:0 16px;
}

.back a{
display:block;
text-align:center;
padding:15px;
text-decoration:none;
font-weight:900;
color:#fff;
border-radius:20px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(14px);
box-shadow:0 14px 26px rgba(0,0,0,.22);
}

audio{
display:none;
}
</style>
</head>

<body>

<audio id="bgm" autoplay loop>
<source src="lagu.mp3">
</audio>

<div class="header">
<div class="badge">SERVER BLUE ELITE</div>
<h1>PANEL HOSTING</h1>
<p>Pilih paket hosting lalu buat nama panel kamu.</p>
</div>

<div class="wrap">
<div class="card">

<div class="label">Pilih Paket</div>
<select id="paket" onchange="updatePrice()">
<option>1GB</option>
<option>2GB</option>
<option>3GB</option>
<option>4GB</option>
<option>5GB</option>
<option>UNLI</option>
<option>RESELLER</option>
<option>ADMIN</option>
<option>OWNER</option>
</select>

<div class="label">Nama Panel</div>
<input type="text" id="nama" placeholder="Masukkan nama panel">

<div id="priceBox">Harga: Rp1.000</div>

<button class="btn" onclick="orderWA()">⚡ PESAN SEKARANG</button>

<div class="note">
Panel cepat, stabil, dan siap dipakai.
</div>

</div>
</div>

<div class="back">
<a href="index.html">⬅ KEMBALI</a>
</div>

<script>
const harga={
"1GB":"1K",
"2GB":"2K",
"3GB":"3K",
"4GB":"4K",
"5GB":"5K",
"UNLI":"10K",
"RESELLER":"15K",
"ADMIN":"25K",
"OWNER":"40K"
};

function updatePrice(){
let p=document.getElementById("paket").value;
document.getElementById("priceBox").innerHTML=
"Harga: Rp"+harga[p].replace("K",".000");
}

function orderWA(){
let p=document.getElementById("paket").value;
let n=document.getElementById("nama").value.trim();

if(n==""){
alert("Masukkan nama panel dulu.");
return;
}

let msg=
`Halo bang saya mau order panel:%0A%0A`+
`Paket: ${p}%0A`+
`Harga: ${harga[p]}%0A`+
`Nama Panel: ${n}`;

window.location.href=
`https://wa.me/6285798898725?text=${msg}`;
}

document.body.addEventListener("click",()=>{
document.getElementById("bgm").play();
},{once:true});

updatePrice();
</script>

</body>
</html>
